<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Visual Project</title>
  <style>
    :root {
      --bg: #f7f5f0;
      --card: #ffffff;
      --text: #2f2a24;
      --muted: #6f665b;
      --accent: #ee9b00;
      --accent-dark: #c27d00;
      --secondary: #5c4d3c;
      --border: #e6dece;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(180deg, #fffdf9 0%, var(--bg) 100%);
      color: var(--text);
    }

    .shell {
      width: min(1100px, calc(100% - 24px));
      margin: 20px auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .site-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px 14px;
      border-bottom: 1px solid rgba(92, 77, 60, 0.14);
      background: linear-gradient(90deg, #fff6e4 0%, #f4ecdf 100%);
    }

    .nav-link {
      text-decoration: none;
      color: var(--secondary);
      padding: 8px 12px;
      border-radius: 8px;
      font-weight: 600;
      border: 1px solid rgba(92, 77, 60, 0.12);
      background: rgba(255, 255, 255, 0.65);
    }

    .nav-link:hover {
      border-color: var(--accent);
      color: #7a5000;
      background: #fff;
    }

    .nav-link.active {
      background: var(--accent);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 8px 18px rgba(238, 155, 0, 0.25);
    }

    .content {
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.8rem, 4vw, 2.5rem);
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .site-footer {
      padding: 12px 18px;
      background: var(--secondary);
      color: #f7f1e8;
      font-size: 0.9rem;
      border-top: 1px solid rgba(0, 0, 0, 0.08);
    }
  </style>
</head>
<body>
  <div class="shell">
    <nav class="site-nav">
      <a class="nav-link active" href="./index.html">Home</a>
      <a class="nav-link" href="./about.html">About</a>
      <a class="nav-link" href="./Drug/drug_dashboard.html">Drug Dashboard</a>
      <a class="nav-link" href="./Speeding/speeding_dashboard.html">Speeding Dashboard</a>
    </nav>

    <main class="content">
      <h1>Data Visual Project</h1>
      <p>Select a dashboard from the navigation bar to explore each topic.</p>
    </main>
    <footer class="site-footer">Data Visual Project · Unified navigation theme</footer>
  </div>
</body>
</html>
